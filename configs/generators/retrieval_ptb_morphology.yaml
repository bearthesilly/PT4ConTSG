condition:
  attribute:
    enabled: false
  fusion: concat
  label:
    enabled: false
  text:
    enabled: true
    input_dim: 1024
data:
  data_folder: ./datasets/ptbxl_morphology
  n_var: 12
  name: ptbxl_morphology
  normalize: false
  seq_length: 1000
device: cuda:0
eval:
  batch_size: 128
  cache_folder: ./cache/ptbxl_morphology
  clip_config_path: null
  clip_model_path: null
  metrics:
  - dtw
  - wape
  - ed
  - crps
  - acd
  - sd
  - kd
  - mdd
  - fid
  - jftsd
  - prdc_f1
  - joint_prdc_f1
  - cttp
  n_samples: 10
  save_samples: true
model:
  name: retrieval
seed: 42
train:
  batch_size: 256
  early_stopping_patience: 50
  epochs: 700
  gradient_clip_val: 1.0
  lr: 0.001
  num_workers: 4
  scheduler: cosine
  weight_decay: 0.0001
