seed: 42
device: cuda:0
train:
  epochs: 700
  batch_size: 256
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_patience: 50
  gradient_clip_val: 1.0
  num_workers: 4
data:
  name: istanbul_traffic
  data_folder: ./datasets/istanbul_traffic_trunc256128
  n_var: 1
  seq_length: 144
  normalize: true
model:
  name: ttscgan
  latent_dim: 100
  g_depth: 3
  d_depth: 3
condition:
  text:
    enabled: false
    input_dim: 1024
  attribute:
    enabled: true
  label:
    enabled: true
    num_classes: 10
  fusion: concat
eval:
  viz:
    enable: true
    n_cases: 20
    output_type: pdf
  metrics:
  - dtw
  - wape
  - ed
  - crps
  - acd
  - sd
  - kd
  - mdd
  - fid
  - jftsd
  - prdc_f1
  - joint_prdc_f1
  - cttp
  n_samples: 10
  batch_size: 128
  save_samples: true
  clip_config_path: ./configs/cttp/cttp_istanbul_traffic.yaml
  clip_model_path: ./checkpoints/cttp/<CTTP_CHECKPOINT>.ckpt
  cache_folder: ./cache/istanbul_traffic
  use_cache: true
  cache_file: predictions_cache.pkl
