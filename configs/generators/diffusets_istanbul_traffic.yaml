seed: 42
device: cuda:0
train:
  epochs: 700
  batch_size: 256
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_patience: 50
  gradient_clip_val: 1.0
  num_workers: 4
  stages:
  - name: vae_pretrain
    epochs: 200
    lr: 0.001
    use_condition: false
  - name: finetune
    epochs: 500
    lr: 0.001
    use_condition: true
    load_from_stage: vae_pretrain
data:
  name: istanbul_traffic
  data_folder: ./datasets/istanbul_traffic_trunc256128
  n_var: 1
  seq_length: 144
  normalize: true
model:
  name: diffusets
  latent_channels: 4
  diffusion_steps: 50
  noise_schedule: quad
  beta_start: 0.0001
  beta_end: 0.5
  num_levels: 5
  kld_weight: 1.0
  kld_annealing: true
  kld_warmup_epochs: 300
condition:
  text:
    enabled: true
    input_dim: 1024
  attribute:
    enabled: false
  label:
    enabled: false
  fusion: concat
eval:
  metrics:
  - dtw
  - wape
  - ed
  - crps
  - acd
  - sd
  - kd
  - mdd
  - fid
  - jftsd
  - prdc_f1
  - joint_prdc_f1
  - cttp
  n_samples: 10
  batch_size: 128
  save_samples: true
  viz:
    enable: true
    n_cases: 20
    output_type: pdf
  clip_config_path: ./configs/cttp/cttp_istanbul_traffic.yaml
  clip_model_path: ./checkpoints/cttp/<CTTP_CHECKPOINT>.ckpt
  cache_folder: ./cache/istanbul_traffic
  use_cache: true
