seed: 42
device: cuda:0
train:
  epochs: 700
  batch_size: 256
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_patience: 50
  gradient_clip_val: 1.0
  num_workers: 4
data:
  name: ettm1
  data_folder: ./datasets/ettm1
  n_var: 1
  seq_length: 120
  normalize: true
model:
  name: bridge
  latent_dim: 32
  num_latents: 16
  latent_unit: 1
  repre_emb_channels: 32
  prototype_dim: 32
  model_channels: 64
  channel_mult:
  - 1
  - 2
  - 4
  - 4
  num_res_blocks: 2
  attention_resolutions:
  - 1
  - 2
  - 4
  num_heads: 8
  use_scale_shift_norm: true
  resblock_updown: true
  use_spatial_transformer: true
  transformer_depth: 1
  context_dim: 32
  text_dim: 1024
  fusion_type: gated_add
  cond_drop_prob: 0.5
  use_cfg: true
  dropout: 0.0
  diffusion_steps: 50
  noise_schedule: quad
  beta_start: 0.0001
  beta_end: 0.5
condition:
  text:
    enabled: true
    input_dim: 1024
  attribute:
    enabled: false
  label:
    enabled: false
  fusion: concat
eval:
  metrics:
  - dtw
  - wape
  - ed
  - crps
  - acd
  - sd
  - kd
  - mdd
  - fid
  - jftsd
  - prdc_f1
  - joint_prdc_f1
  - cttp
  n_samples: 10
  batch_size: 128
  save_samples: true
  viz:
    enable: true
    n_cases: 20
    output_type: pdf
  clip_config_path: ./configs/cttp/cttp_ettm1.yaml
  clip_model_path: ./checkpoints/cttp/<CTTP_CHECKPOINT>.ckpt
  cache_folder: ./cache/ettm1
  use_cache: true
