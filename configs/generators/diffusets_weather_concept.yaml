condition:
  attribute:
    enabled: false
  fusion: concat
  label:
    enabled: false
  text:
    enabled: true
    input_dim: 1024
data:
  data_folder: ./datasets/weather_concept
  n_var: 10
  name: weather_concept
  normalize: true
  seq_length: 36
device: cuda:0
eval:
  batch_size: 128
  cache_folder: ./cache/weather_concept
  clip_config_path: ./configs/cttp/cttp_weather_concept.yaml
  clip_model_path: ./checkpoints/cttp/<CTTP_CHECKPOINT>.ckpt
  metrics:
  - dtw
  - wape
  - ed
  - crps
  - acd
  - sd
  - kd
  - mdd
  - fid
  - jftsd
  - prdc_f1
  - joint_prdc_f1
  - cttp
  n_samples: 10
  save_samples: true
  viz:
    enable: true
    n_cases: 20
    output_type: pdf
  clip_normalize_embeddings: false
model:
  beta_end: 0.5
  beta_start: 0.0001
  diffusion_steps: 50
  kld_annealing: true
  kld_warmup_epochs: 300
  kld_weight: 1.0
  latent_channels: 4
  name: diffusets
  noise_schedule: quad
  num_levels: 5
seed: 42
train:
  batch_size: 256
  early_stopping_patience: 50
  epochs: 700
  gradient_clip_val: 1.0
  lr: 0.001
  num_workers: 4
  scheduler: cosine
  stages:
  - epochs: 200
    lr: 0.001
    name: vae_pretrain
    use_condition: false
  - epochs: 500
    load_from_stage: vae_pretrain
    lr: 0.001
    name: finetune
    use_condition: true
  weight_decay: 0.0001
