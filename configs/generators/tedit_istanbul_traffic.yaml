seed: 42
device: cuda:0
train:
  epochs: 700
  batch_size: 256
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_patience: 50
  gradient_clip_val: 1.0
  num_workers: 4
data:
  name: istanbul_traffic
  data_folder: ./datasets/istanbul_traffic_trunc256128
  n_var: 1
  seq_length: 144
  normalize: true
model:
  name: tedit
  layers: 3
  channels: 64
  nheads: 8
  diffusion_steps: 50
  noise_schedule: quad
  beta_start: 0.0001
  beta_end: 0.5
  L_patch_len: 3
  multipatch_num: 3
  base_patch: 4
  attention_mask_type: parallel
  attr_proj_type: avg
  attr_heads: 8
  attr_layers: 2
  n_attrs: 4
  feature_ratio: 0.5
  side_var_emb: 16
  side_time_emb: 112
condition:
  text:
    enabled: false
    input_dim: 1024
  attribute:
    enabled: true
  label:
    enabled: false
  fusion: concat
eval:
  metrics:
  - dtw
  - wape
  - ed
  - crps
  - acd
  - sd
  - kd
  - mdd
  - fid
  - jftsd
  - prdc_f1
  - joint_prdc_f1
  - cttp
  n_samples: 10
  batch_size: 128
  save_samples: true
  viz:
    enable: true
    n_cases: 20
    output_type: pdf
  clip_config_path: ./configs/cttp/cttp_istanbul_traffic.yaml
  clip_model_path: ./checkpoints/cttp/<CTTP_CHECKPOINT>.ckpt
  cache_folder: ./cache/istanbul_traffic
  use_cache: true
